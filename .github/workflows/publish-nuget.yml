name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.2)'
        required: true
        default: '1.0.2'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Restore
        run: dotnet restore src/framework/GlueFramework.Core/GlueFramework.Core.sln || dotnet restore

      - name: Build all projects
        run: |
          dotnet build src/framework/GlueFramework.AuditLog.Abstractions/GlueFramework.AuditLog.Abstractions.csproj -c Release --no-restore
          dotnet build src/framework/GlueFramework.AuditLogModule/GlueFramework.AuditLogModule.csproj -c Release --no-restore
          dotnet build src/framework/GlueFramework.Core/GlueFramework.Core.csproj -c Release --no-restore
          dotnet build src/framework/GlueFramework.OrchardCore.Observability/GlueFramework.OrchardCore.Observability.csproj -c Release --no-restore
          dotnet build src/framework/GlueFramework.OrchardCoreModule/GlueFramework.OrchardCoreModule.csproj -c Release --no-restore
          dotnet build src/framework/GlueFramework.OutboxModule/GlueFramework.OutboxModule.csproj -c Release --no-restore
          dotnet build src/framework/GlueFramework.WebCore/GlueFramework.WebCore.csproj -c Release --no-restore
          dotnet build src/framework/GlueFramework.CustomSysSettingsModule/GlueFramework.CustomSysSettingsModule.csproj -c Release --no-restore

      - name: Pack all projects
        run: |
          mkdir -p ./artifacts
          VERSION="${{ steps.version.outputs.version }}"
          dotnet pack src/framework/GlueFramework.AuditLog.Abstractions/GlueFramework.AuditLog.Abstractions.csproj -c Release --no-build --no-restore -p:Version=$VERSION -o ./artifacts
          dotnet pack src/framework/GlueFramework.AuditLogModule/GlueFramework.AuditLogModule.csproj -c Release --no-build --no-restore -p:Version=$VERSION -o ./artifacts
          dotnet pack src/framework/GlueFramework.Core/GlueFramework.Core.csproj -c Release --no-build --no-restore -p:Version=$VERSION -o ./artifacts
          dotnet pack src/framework/GlueFramework.OrchardCore.Observability/GlueFramework.OrchardCore.Observability.csproj -c Release --no-build --no-restore -p:Version=$VERSION -o ./artifacts
          dotnet pack src/framework/GlueFramework.OrchardCoreModule/GlueFramework.OrchardCoreModule.csproj -c Release --no-build --no-restore -p:Version=$VERSION -o ./artifacts
          dotnet pack src/framework/GlueFramework.OutboxModule/GlueFramework.OutboxModule.csproj -c Release --no-build --no-restore -p:Version=$VERSION -o ./artifacts
          dotnet pack src/framework/GlueFramework.WebCore/GlueFramework.WebCore.csproj -c Release --no-build --no-restore -p:Version=$VERSION -o ./artifacts
          dotnet pack src/framework/GlueFramework.CustomSysSettingsModule/GlueFramework.CustomSysSettingsModule.csproj -c Release --no-build --no-restore -p:Version=$VERSION -o ./artifacts

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
